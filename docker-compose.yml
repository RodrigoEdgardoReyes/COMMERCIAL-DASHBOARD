services:
  db:
    image: postgres:16-alpine
    container_name: olist_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-olist_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-olist_pass}
      POSTGRES_DB: ${POSTGRES_DB:-olist_dashboard}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-olist_user} -d ${POSTGRES_DB:-olist_dashboard}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: olist_backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://olist_user:olist_pass@db:5432/olist_dashboard
      BACKEND_PORT: 3001
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: olist_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001 # Comunicación interna en Docker
    depends_on:
      - backend

volumes:
  postgres_data: